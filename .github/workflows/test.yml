name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

# Cancel redundant runs on the same branch/PR so pushes don't queue up
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint (runs in parallel with all service tests) ──────────────────────────
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check auth-service/ user-service/ product-service/

      - name: Ruff format check
        run: ruff format --check auth-service/ user-service/ product-service/

  # ── auth-service ─────────────────────────────────────────────────────────────
  test-auth-service:
    name: auth-service tests
    runs-on: ubuntu-latest

    # auth-service talks to Postgres (Alembic migrations) and RabbitMQ
    # (publish_user_registered). Both are mocked in unit tests but CI
    # spins them up here so integration tests have real infrastructure.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: auth_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      rabbitmq:
        image: rabbitmq:4-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: test_user
          RABBITMQ_DEFAULT_PASS: test_password
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    defaults:
      run:
        working-directory: auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auth-service/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          # Tests use SQLite in-memory — these are available for any
          # test that wants real Postgres (e.g. Alembic smoke tests)
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/auth_test_db
          RABBITMQ_URL: amqp://test_user:test_password@localhost:5672/
          JWT_SECRET: ci-test-secret-not-for-production
          SES_SENDER_EMAIL: no-reply@ci.example
          AWS_REGION: us-east-1
          # Dummy AWS creds so boto3 doesn't fail at import time
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-coverage
          path: auth-service/coverage.xml
          retention-days: 7

  # ── user-service ─────────────────────────────────────────────────────────────
  test-user-service:
    name: user-service tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: user_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      rabbitmq:
        image: rabbitmq:4-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: test_user
          RABBITMQ_DEFAULT_PASS: test_password
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    defaults:
      run:
        working-directory: user-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: user-service/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/user_test_db
          RABBITMQ_URL: amqp://test_user:test_password@localhost:5672/
          JWT_SECRET: ci-test-secret-not-for-production
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: user-coverage
          path: user-service/coverage.xml
          retention-days: 7

  # ── product-service ───────────────────────────────────────────────────────────
  test-product-service:
    name: product-service tests
    runs-on: ubuntu-latest

    # product-service has no RabbitMQ dependency
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: product_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: product-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: product-service/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/product_test_db
          JWT_SECRET: ci-test-secret-not-for-production
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: product-coverage
          path: product-service/coverage.xml
          retention-days: 7