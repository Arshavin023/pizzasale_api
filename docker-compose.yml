services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: always

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always

    depends_on:
      rabbitmq:
        condition: service_healthy

    env_file:
      - .env

    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "8001:8000"

    volumes:
      - ./auth-service:/app

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always

    depends_on:
      rabbitmq:
        condition: service_healthy

    env_file:
      - .env

    environment:
      DATABASE_URL: ${USER_DATABASE_URL}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "8002:8000"

    volumes:
      - ./user-service:/app

  # Separate process from user-service's API container — same image,
  # different command. Consumes RabbitMQ events independently of HTTP
  # traffic, so the two workloads can be scaled/restarted independently.
  user-service-worker:
    build: ./user-service
    container_name: user-service-worker
    restart: always

    depends_on:
      rabbitmq:
        condition: service_healthy

    env_file:
      - .env

    environment:
      DATABASE_URL: ${USER_DATABASE_URL}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./user-service:/app

    command: ["python", "-m", "app.workers.consumer"]

volumes:
  rabbitmq_data: