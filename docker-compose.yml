services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always

    env_file:
      - .env

    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}

    extra_hosts:
      # Lets containers resolve the host machine's Postgres, same name
      # works on Linux, Mac, and Windows.
      - "host.docker.internal:host-gateway"

    ports:
      - "8001:8000"

    volumes:
      - ./auth-service:/app

  # Uncomment once user-service/app/* is actually implemented.
